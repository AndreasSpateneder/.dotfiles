# Defaults
unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s

set -g mouse on
set -g default-terminal "tmux-256color"
set-option -g focus-events on
set-option -g status-position top
set -g base-index 1
set -g set-clipboard on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Configure the catppuccin plugin
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{window_name} "
# set -g @catppuccin_window_current_text " #W "
set -g @catppuccin_window_current_text " #{window_name} "
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-left-length 100
set -g status-left ""

set -g status-right-length 100
set -g status-right ""
set -agF status-right "#{@catppuccin_status_session}"
set -agF status-right "#{@catppuccin_status_application}"
set -agF status-right "#{@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# smart-splits
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)
set -g @smart-splits_resize_step_size '3' # change the step-size for resizing.

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
